<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2560" aria-labelledby="title desc" role="img" viewBox="0 0 1600 2560"><title id="title">Harness Engineering：Claude Code 设计指南</title><desc id="desc">满版书籍封面。纸白、黑、暗红三色，构图冷峻克制，强调控制面、循环与恢复的工程骨架。</desc><defs><linearGradient id="paper" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#f6f1e7"/><stop offset="100%" stop-color="#e9dfcf"/></linearGradient></defs><rect width="1600" height="2560" fill="url(#paper)"/><rect width="1600" height="122" x="0" y="0" fill="#111"/><rect width="96" height="2438" x="0" y="122" fill="#111"/><rect width="96" height="2438" x="1504" y="122" fill="#7b1e1e"/><rect width="1408" height="730" x="96" y="1830" fill="#111"/><rect width="1408" height="26" x="96" y="1460" fill="#7b1e1e"/><rect width="930" height="694" x="188" y="272" fill="none" stroke="#111" stroke-width="6"/><rect width="294" height="694" x="1118" y="272" fill="#111"/><line x1="188" x2="1412" y1="504" y2="504" stroke="#7b1e1e" stroke-width="8"/><line x1="188" x2="1412" y1="736" y2="736" stroke="#111" stroke-width="4"/><line x1="494" x2="494" y1="272" y2="966" stroke="#b6ab9b" stroke-width="3"/><line x1="800" x2="800" y1="272" y2="966" stroke="#b6ab9b" stroke-width="3"/><text x="188" y="212" fill="#6e675f" font-family="Georgia, 'Times New Roman', serif" font-size="28" letter-spacing="6">AGENTWAY / HARNESS BOOKS</text><text x="238" y="432" fill="#111" font-family="Georgia, 'Times New Roman', serif" font-size="44">控制面</text><text x="544" y="432" fill="#111" font-family="Georgia, 'Times New Roman', serif" font-size="44">循环</text><text x="852" y="432" fill="#111" font-family="Georgia, 'Times New Roman', serif" font-size="44">恢复</text><text x="236" y="666" fill="#111" font-family="Georgia, 'Times New Roman', serif" font-size="40">权限</text><text x="540" y="666" fill="#111" font-family="Georgia, 'Times New Roman', serif" font-size="40">中断</text><text x="846" y="666" fill="#111" font-family="Georgia, 'Times New Roman', serif" font-size="40">验证</text><text x="1168" y="438" fill="#efe7d9" font-family="Georgia, 'Times New Roman', serif" font-size="30">先有规矩</text><text x="1168" y="484" fill="#efe7d9" font-family="Georgia, 'Times New Roman', serif" font-size="30">再谈聪明</text><text x="1168" y="640" fill="#c7beb0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="2">SYSTEM FIRST</text><text x="1168" y="678" fill="#c7beb0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="2">MODEL SECOND</text><text x="188" y="1166" fill="#161616" font-family="Georgia, 'Times New Roman', serif" font-size="128" font-weight="700">Harness</text><text x="188" y="1324" fill="#161616" font-family="Georgia, 'Times New Roman', serif" font-size="128" font-weight="700">Engineering</text><text x="188" y="1558" fill="#7b1e1e" font-family="Georgia, 'Times New Roman', serif" font-size="76">Claude Code 设计指南</text><text x="188" y="1938" fill="#f4ede0" font-family="Georgia, 'Times New Roman', serif" font-size="62">一个系统的体面，</text><text x="188" y="2022" fill="#f4ede0" font-family="Georgia, 'Times New Roman', serif" font-size="62">不在它会不会说，</text><text x="188" y="2106" fill="#f4ede0" font-family="Georgia, 'Times New Roman', serif" font-size="62">而在它出了岔子以后，</text><text x="188" y="2190" fill="#f4ede0" font-family="Georgia, 'Times New Roman', serif" font-size="62">谁来把残局接住。</text><line x1="188" x2="1412" y1="2298" y2="2298" stroke="#7b1e1e" stroke-width="3"/><text x="188" y="2376" fill="#d7cdbd" font-family="Georgia, 'Times New Roman', serif" font-size="30" letter-spacing="2">CONTROL PLANE / QUERY LOOP / RECOVERY / VERIFICATION</text><text x="188" y="2450" fill="#d7cdbd" font-family="Georgia, 'Times New Roman', serif" font-size="30">从源码抽象出可控 AI 编程系统的工程原则</text><text x="1412" y="2450" fill="#d34a43" font-family="Georgia, 'Times New Roman', serif" font-size="30" letter-spacing="2" text-anchor="end">agentway.dev</text></svg>