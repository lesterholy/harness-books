<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2560" aria-labelledby="title desc" role="img" viewBox="0 0 1600 2560"><title id="title">Claude Code 和 Codex 的 Harness 设计哲学</title><desc id="desc">满版书籍封面。纸白、黑、暗红三色，左右对照张力更强，用于表现 Claude Code 与 Codex 的比较关系。</desc><defs><linearGradient id="paper" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#f6f1e7"/><stop offset="100%" stop-color="#e9dfcf"/></linearGradient></defs><rect width="1600" height="2560" fill="url(#paper)"/><rect width="1600" height="140" x="0" y="0" fill="#111"/><rect width="1600" height="28" x="0" y="140" fill="#7b1e1e"/><rect width="1600" height="736" x="0" y="1824" fill="#111"/><rect width="1308" height="792" x="146" y="280" fill="none" stroke="#111" stroke-width="6"/><rect width="654" height="792" x="146" y="280" fill="#111"/><rect width="654" height="792" x="800" y="280" fill="#efe6d7"/><line x1="800" x2="800" y1="280" y2="1072" stroke="#7b1e1e" stroke-width="10"/><line x1="146" x2="1454" y1="676" y2="676" stroke="#7b1e1e" stroke-width="8"/><text x="146" y="228" fill="#6e675f" font-family="Georgia, 'Times New Roman', serif" font-size="28" letter-spacing="6">AGENTWAY / COMPARATIVE HARNESS NOTES</text><text x="222" y="484" fill="#f3ece0" font-family="Georgia, 'Times New Roman', serif" font-size="58">Claude Code</text><text x="222" y="562" fill="#f3ece0" font-family="Georgia, 'Times New Roman', serif" font-size="34">控制流先落地</text><text x="222" y="642" fill="#c8beb1" font-family="Georgia, 'Times New Roman', serif" font-size="26" letter-spacing="2">RUNTIME DISCIPLINE</text><text x="222" y="760" fill="#f3ece0" font-family="Georgia, 'Times New Roman', serif" font-size="36">秩序住在运行时</text><text x="876" y="484" fill="#111" font-family="Georgia, 'Times New Roman', serif" font-size="58">Codex</text><text x="876" y="562" fill="#111" font-family="Georgia, 'Times New Roman', serif" font-size="34">制度层先设防</text><text x="876" y="642" fill="#7b1e1e" font-family="Georgia, 'Times New Roman', serif" font-size="26" letter-spacing="2">POLICY AND LOCAL RULES</text><text x="876" y="760" fill="#111" font-family="Georgia, 'Times New Roman', serif" font-size="36">规矩住在系统外沿</text><text x="146" y="1260" fill="#161616" font-family="Georgia, 'Times New Roman', serif" font-size="118" font-weight="700">Claude Code 和 Codex</text><text x="146" y="1418" fill="#161616" font-family="Georgia, 'Times New Roman', serif" font-size="118" font-weight="700">的 Harness 设计哲学</text><text x="146" y="1604" fill="#7b1e1e" font-family="Georgia, 'Times New Roman', serif" font-size="72">殊途同归，还是各表一枝</text><text x="146" y="1930" fill="#f4ede0" font-family="Georgia, 'Times New Roman', serif" font-size="58">做系统的人，</text><text x="146" y="2012" fill="#f4ede0" font-family="Georgia, 'Times New Roman', serif" font-size="58">不过是把必然会来的摧残，</text><text x="146" y="2094" fill="#f4ede0" font-family="Georgia, 'Times New Roman', serif" font-size="58">提前写进控制流，</text><text x="146" y="2176" fill="#f4ede0" font-family="Georgia, 'Times New Roman', serif" font-size="58">省得它反过来支配你。</text><line x1="146" x2="1454" y1="2286" y2="2286" stroke="#7b1e1e" stroke-width="3"/><text x="146" y="2364" fill="#d7cdbd" font-family="Georgia, 'Times New Roman', serif" font-size="31" letter-spacing="2">CONTROL / LOOP / POLICY / STATE / LOCAL GOVERNANCE / VERIFICATION</text><text x="146" y="2442" fill="#d7cdbd" font-family="Georgia, 'Times New Roman', serif" font-size="31">一部关于控制层、状态治理、工具边界与组织纪律的比较工程笔记</text><text x="1454" y="2442" fill="#d34a43" font-family="Georgia, 'Times New Roman', serif" font-size="30" letter-spacing="2" text-anchor="end">agentway.dev</text></svg>